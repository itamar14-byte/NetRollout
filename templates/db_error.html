<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Database Unavailable — NetRollout</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#121212; color:#e0e0e0; font-family:'Inter',sans-serif;
               display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .box { text-align:center; max-width:460px; padding:2rem; }
        .badge { font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:2px;
                 color:#555; text-transform:uppercase; margin-bottom:1rem; }
        h1 { font-size:1.1rem; color:#ef9a9a; margin:0 0 0.75rem; }
        .addr { font-family:'JetBrains Mono',monospace; font-size:0.88rem;
                color:#00bcd4; background:rgba(0,188,212,0.06);
                border:1px solid rgba(0,188,212,0.15); border-radius:6px;
                padding:0.4rem 0.9rem; display:inline-block; margin-bottom:1rem; }
        p { font-size:0.82rem; color:#555; margin:0 0 1.5rem; line-height:1.6; }
        a { font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:#00bcd4;
            text-decoration:none; border:1px solid rgba(0,188,212,0.25); padding:0.4rem 1rem;
            border-radius:6px; transition:background 0.15s; }
        a:hover { background:rgba(0,188,212,0.06); }
    </style>
</head>
<body>
    <div class="box">
        <div class="badge">NetRollout</div>
        <h1>Database Unavailable</h1>
        <div class="addr">{{ db_host }}:{{ db_port }}</div>
        <p>Could not reach the PostgreSQL database.<br>
           Make sure the DB container is running and reachable<br>at the address above.</p>
        <a href="/">Retry</a>
    </div>
</body>
</html>
